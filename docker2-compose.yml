version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx_server
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./html:/usr/share/nginx/html:ro              # your static site files
      - ./nginx/conf.d:/etc/nginx/conf.d:ro          # custom config files
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro  # main config (optional)
      - ./certs:/etc/nginx/certs:ro                  # SSL certificates (optional)
      - nginx_logs:/var/log/nginx
    networks:
      - nginx_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  nginx_logs:
    driver: local

networks:
  nginx_network:
    driver: bridge
